<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위바위보 게임</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align: center; transition: 0.3s; }
.dark { background:#121212; color:white; }
button { padding:10px 20px; margin:5px; font-size:16px; }
.top-bar { position:absolute; top:10px; right:10px; }
.table-box { display:none; margin-top:20px; }
canvas { max-width:600px; margin:20px auto; }
.confetti { position:fixed; width:10px; height:10px; background:red; animation:fall 3s linear infinite; }
@keyframes fall { to { transform:translateY(100vh) rotate(360deg);} }
</style>
</head>
<body>

<div class="top-bar">
<button onclick="toggleDark()">다크 모드</button>
<button onclick="toggleTable()">승률 보기</button>
</div>

<h1>✊✋✌️ 가위바위보</h1>

<div>
<button onclick="play('가위')">가위</button>
<button onclick="play('바위')">바위</button>
<button onclick="play('보')">보</button>
</div>

<h2 id="result"></h2>
<h3 id="score">나: 0 | 컴퓨터: 0</h3>

<div class="table-box" id="tableBox">
<h3>승률 테이블</h3>
<table border="1" style="margin:auto;">
<tr><th>판수</th><th>승률</th></tr>
<tbody id="tableBody"></tbody>
</table>
</div>

<canvas id="chart"></canvas>

<script>
let userScore = 0;
let compScore = 0;
let history = [];

function play(user) {
    const choices = ['가위','바위','보'];
    const comp = choices[Math.floor(Math.random()*3)];

    let result = '';
    if(user === comp) result = '무승부';
    else if(
        (user==='가위'&&comp==='보')||
        (user==='바위'&&comp==='가위')||
        (user==='보'&&comp==='바위')
    ) {
        result='승리'; userScore++;
    } else { result='패배'; compScore++; }

    document.getElementById('result').innerText = `${user} vs ${comp} → ${result}`;
    document.getElementById('score').innerText = `나: ${userScore} | 컴퓨터: ${compScore}`;

    const total = userScore + compScore;
    if(total>0) {
        const rate = (userScore/total*100).toFixed(1);
        history.push(rate);
        updateTable(rate);
        drawChart();
    }

    if(userScore===3 || compScore===3) endGame();
}

function endGame() {
    if(userScore===3) {
        document.getElementById('result').innerText = '🎉 축하합니다! 승리!';
        confetti();
    } else {
        document.getElementById('result').innerText = '😢 아쉽네요... 다시 도전!';
    }
    setTimeout(()=>{
        userScore=0; compScore=0; history=[];
        document.getElementById('score').innerText='나: 0 | 컴퓨터: 0';
        document.getElementById('tableBody').innerHTML='';
        drawChart();
    },2000);
}

function toggleDark() {
    document.body.classList.toggle('dark');
}

function toggleTable() {
    const box = document.getElementById('tableBox');
    box.style.display = box.style.display==='none'?'block':'none';
}

function updateTable(rate) {
    const row = `<tr><td>${history.length}</td><td>${rate}%</td></tr>`;
    document.getElementById('tableBody').innerHTML += row;
}

let chart;
function drawChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type:'line',
        data:{
            labels: history.map((_,i)=>i+1),
            datasets:[{ label:'승률(%)', data:history }]
        }
    });
}

function confetti() {
    for(let i=0;i<50;i++){
        const div = document.createElement('div');
        div.className='confetti';
        div.style.left = Math.random()*100+'vw';
        div.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(div);
        setTimeout(()=>div.remove(),3000);
    }
}
</script>

</body>
</html>
